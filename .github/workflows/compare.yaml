name: Bundle Size Comparison

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

# 只读权限即可：本 workflow 会执行 PR(可能来自 fork)的代码,
# 评论 PR 的写操作放在 compare-comment.yaml 里完成。
permissions:
  contents: read

jobs:
  compare-size:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: yarn install

      - name: Build
        run: yarn build

      - name: Run comparison (size, accuracy & speed)
        run: |
          set -o pipefail
          npm run compare 2>&1 | tee compare-output.txt

      - name: Save PR number
        if: github.event_name == 'pull_request'
        run: echo "${{ github.event.pull_request.number }}" > pr-number.txt

      # 上传对比结果,供 compare-comment.yaml 在有写权限的上下文中下载并评论。
      # fork PR 的 GITHUB_TOKEN 在此被强制为只读,无法直接评论,故拆分。
      - name: Upload comparison artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: compare-output
          path: |
            compare-output.txt
            pr-number.txt
          retention-days: 1
